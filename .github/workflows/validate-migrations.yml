name: Validate Migration Versions

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'backend/src/main/resources/db/migration/**'

jobs:
  check-migration-conflicts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for migration version conflicts
        id: migration-check
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          MIGRATION_DIR="backend/src/main/resources/db/migration"

          echo "Checking migrations against base branch: $BASE_BRANCH"

          PR_MIGRATIONS=$(git diff --name-only --diff-filter=A origin/$BASE_BRANCH...HEAD -- "$MIGRATION_DIR" | xargs -I{} basename {} 2>/dev/null || true)

          if [ -z "$PR_MIGRATIONS" ]; then
            echo "No new migration files detected in this PR."
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "message=Nenhum arquivo de migration novo detectado neste PR." >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_VERSIONS=$(echo "$PR_MIGRATIONS" | grep -oP '^V[\d.]+(?=__)' || true)

          if [ -z "$PR_VERSIONS" ]; then
            echo "Could not parse version prefixes. Skipping check."
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "message=Não foi possível extrair prefixos de versão dos arquivos. Verificação ignorada." >> $GITHUB_OUTPUT
            exit 0
          fi

          BASE_MIGRATIONS=$(git ls-tree -r --name-only origin/$BASE_BRANCH -- "$MIGRATION_DIR" | xargs -I{} basename {} 2>/dev/null || true)

          CONFLICTS=""
          while IFS= read -r pr_version; do
            MATCH=$(echo "$BASE_MIGRATIONS" | grep -P "^${pr_version}__" || true)
            if [ -n "$MATCH" ]; then
              CONFLICTS="$CONFLICTS\n- Versão \`$pr_version\` conflita com: \`$MATCH\`"
            fi
          done <<< "$PR_VERSIONS"

          if [ -n "$CONFLICTS" ]; then
            echo "status=conflict" >> $GITHUB_OUTPUT
            {
              echo "message<<EOF"
              echo -e "$CONFLICTS"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "::error::Migration version conflict detected!"
            exit 1
          fi

          NEW_FILES=$(echo "$PR_MIGRATIONS" | sed 's/^/- `/' | sed 's/$/`/')
          echo "status=ok" >> $GITHUB_OUTPUT
          {
            echo "message<<EOF"
            echo -e "$NEW_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "No migration version conflicts found."

      - name: Comment on PR (conflict)
        if: failure() && steps.migration-check.outputs.status == 'conflict'
        uses: actions/github-script@v7
        env:
          CONFLICTS_MSG: ${{ steps.migration-check.outputs.message }}
          BASE_BRANCH: ${{ github.base_ref }}
        with:
          script: |
            const conflicts = process.env.CONFLICTS_MSG;
            const baseBranch = process.env.BASE_BRANCH;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Conflito de versão em migrations\n\nAs seguintes migrations adicionadas neste PR possuem prefixos de versão que já existem na branch \`${baseBranch}\`:\n\n${conflicts}\n\nRenomeie o(s) arquivo(s) para usar um prefixo de versão único antes de mergear.`
            });

      - name: Comment on PR (success)
        if: success()
        uses: actions/github-script@v7
        env:
          FILES_MSG: ${{ steps.migration-check.outputs.message }}
          BASE_BRANCH: ${{ github.base_ref }}
        with:
          script: |
            const files = process.env.FILES_MSG;
            const baseBranch = process.env.BASE_BRANCH;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ Migrations validadas\n\nNenhum conflito de versão encontrado na branch \`${baseBranch}\`.\n\n**Arquivos verificados:**\n${files}`
            });

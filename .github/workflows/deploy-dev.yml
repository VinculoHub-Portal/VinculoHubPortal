name: Deploy Development

on:
  push:
    branches:
      - development

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push das imagens
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DEV_VITE_API_URL: ${{ secrets.DEV_VITE_API_URL }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.VITE_AUTH0_AUDIENCE }}
          DEV_VITE_AUTH0_REDIRECT_URI: ${{ secrets.DEV_VITE_AUTH0_REDIRECT_URI }}
        run: |
          docker compose -f docker-compose.swarm.yml build frontend-dev backend-dev
          docker compose -f docker-compose.swarm.yml push frontend-dev backend-dev

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Acessar EC2 e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd ~/VinculoHubPortal
            git fetch
            git checkout development
            git pull origin development

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            set -a
            source .env
            set +a

            docker compose -f docker-compose.swarm.yml pull frontend-dev backend-dev
            docker stack deploy --with-registry-auth -c docker-compose.swarm.yml vinculohub
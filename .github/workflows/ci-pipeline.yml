name: CI Pipeline - VinculoHub

on:
  pull_request:
    branches:
      - development
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Code Style
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Main Branch
        run: git fetch origin main:main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"
      - name: Install Frontend Dependencies
        run: npm ci --prefix ./frontend

      - name: Run Frontend Lint & Typecheck
        working-directory: ./frontend
        run: |
          npm run lint
          npx -p typescript tsc --project tsconfig.json --noEmit

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Run Backend Static Analysis
        run: mvn spotless:check pmd:check spotbugs:check --file backend/pom.xml

  docker-build-check:                                                                                                                                                                                
    name: Docker Containers Build Test                                                                                                                                                               
    runs-on: ubuntu-latest            
    needs: lint                                                                                                                                                                                      
    timeout-minutes: 20                                                            
    steps:                                                                                                                                                                                           
      - uses: actions/checkout@v4
                                                                                                                                                                                                     
      - name: Set up Docker Buildx                                                 
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Container                                                                                                                                                                
        uses: docker/build-push-action@v6
        with:                                                                                                                                                                                        
          context: ./backend                                                       
          push: false                 
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
                                                                                                                                                                                                     
      - name: Build Frontend Container
        uses: docker/build-push-action@v6                                                                                                                                                            
        with:                                                                      
          context: ./frontend         
          push: false
          build-args: |
            VITE_API_URL=http://localhost:8080
            VITE_AUTH0_DOMAIN=placeholder                                                                                                                                                            
            VITE_AUTH0_CLIENT_ID=placeholder
            VITE_AUTH0_AUDIENCE=https://api.vinculohub                                                                                                                                               
          cache-from: type=gha,scope=frontend                                      
          cache-to: type=gha,mode=max,scope=frontend                                                                                                                                                 
   
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Run Backend Tests
        run: mvn test --file backend/pom.xml

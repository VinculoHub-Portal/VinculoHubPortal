name: CI Pipeline - VinculoHub

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  lint:
    name: Lint & Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Frontend Dependencies
        run: npm ci --prefix ./frontend
      - name: Run Frontend Lint & Typecheck
        run: |
          npm run lint --prefix ./frontend
          npm run typecheck --prefix ./frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Backend Static Analysis
        run: mvn spotless:check pmd:check spotbugs:check --file backend/pom.xml

  docker-build-check:
    name: Docker Containers Build Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Frontend Container
        run: docker compose build frontend
        
      - name: Build Backend Container
        run: docker compose build backend

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Backend Tests
        run: mvn test --file backend/pom.xml
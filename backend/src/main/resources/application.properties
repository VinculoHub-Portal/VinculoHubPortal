spring.application.name=backend
server.port=${BACKEND_PORT:8080}

# ---- PostgreSQL DataSource ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vinculohub_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vinculohub}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vinculohub}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Logging ----
logging.level.com.vinculohub.backend=INFO
logging.level.org.springframework.security=WARN

# ---- Auth0 / Security ----
app.frontend.url=${FRONTEND_URL:http://localhost:5173,http://localhost}
app.auth0.roles-claim=${AUTH0_ROLES_CLAIM:https://vinculohub/roles}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE}

# ---- Optional sample data seed ----
app.sample-data.enabled=${APP_SAMPLE_DATA_ENABLED:false}
app.sample-data.dataset-id=${APP_SAMPLE_DATA_DATASET_ID:default}
app.sample-data.location=${APP_SAMPLE_DATA_LOCATION:classpath:db/sample-data/default}
app.sample-data.auth0.domain=${APP_SAMPLE_DATA_AUTH0_DOMAIN:}
app.sample-data.auth0.client-id=${APP_SAMPLE_DATA_AUTH0_CLIENT_ID:}
app.sample-data.auth0.client-secret=${APP_SAMPLE_DATA_AUTH0_CLIENT_SECRET:}

# ---- PostgreSQL Database (Para Testes com Testcontainers) ----
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration

spring.test.database.replace=none

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=1000
spring.datasource.hikari.max-lifetime=3000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.connection-timeout=5000

# ---- Security ----
app.frontend.url=http://localhost:5173
app.auth0.roles-claim=https://vinculohub/roles
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://test.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://api.vinculohub

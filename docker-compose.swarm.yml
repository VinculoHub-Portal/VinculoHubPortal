services:
  # ==========================================
  # AMBIENTE DEV (Sincronizado com a branch 'development')
  # ==========================================
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/vinculohubportal-backend:dev
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-dev:5432/${POSTGRES_DB:-vinculohub_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-vinculohub}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - FRONTEND_URL=${DEV_FRONTEND_URL:-http://localhost:5173}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=vinculohub-portal-storage
      - AWS_REGION=us-east-2
      - AUTH0_ISSUER_URI=${AUTH0_ISSUER_URI}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - AUTH0_ROLES_CLAIM=${AUTH0_ROLES_CLAIM:-https://vinculohub/roles}
    depends_on:
      - db-dev
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${DEV_VITE_API_URL:-http://localhost:8080}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
        - VITE_AUTH0_REDIRECT_URI=${DEV_VITE_AUTH0_REDIRECT_URI}
    image: ${DOCKERHUB_USERNAME}/vinculohubportal-frontend:dev
    ports:
      - "83:80"
    deploy:
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure

  db-dev:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vinculohub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - POSTGRES_DB=${POSTGRES_DB:-vinculohub_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: [node.role == manager]

  flyway-dev:
    image: flyway/flyway:9
    depends_on:
      - db-dev
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql:ro
    command: >
      -url=jdbc:postgresql://db-dev:5432/${POSTGRES_DB:-vinculohub_db}
      -user=${POSTGRES_USER:-vinculohub}
      -password=${POSTGRES_PASSWORD:-vinculohub}
      migrate
    deploy:
      placement:
        constraints: [node.role == manager]

  # ==========================================
  # AMBIENTE PROD/CLIENTE (Sincronizado com a branch 'main')
  # ==========================================
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/vinculohubportal-backend:prod
    ports:
      - "8081:8080" # Acesso externo via porta 8081
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-prod:5432/${POSTGRES_DB:-vinculohub_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-vinculohub}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - FRONTEND_URL=${PROD_FRONTEND_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=vinculohub-portal-storage
      - AWS_REGION=us-east-2
      - AUTH0_ISSUER_URI=${AUTH0_ISSUER_URI}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - AUTH0_ROLES_CLAIM=${AUTH0_ROLES_CLAIM:-https://vinculohub/roles}
    depends_on:
      - db-prod
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${PROD_VITE_API_URL}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
        - VITE_AUTH0_REDIRECT_URI=${PROD_VITE_AUTH0_REDIRECT_URI}
    image: ${DOCKERHUB_USERNAME}/vinculohubportal-frontend:prod
    ports:
      - "81:80" # Acesso externo via porta 81
    deploy:
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure

  db-prod:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vinculohub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - POSTGRES_DB=${POSTGRES_DB:-vinculohub_db}
    ports:
      - "5433:5432" # Acesso externo ao DB na 5433
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: [node.role == manager]

  flyway-prod:
    image: flyway/flyway:9
    depends_on:
      - db-prod
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql:ro
    command: >
      -url=jdbc:postgresql://db-prod:5432/${POSTGRES_DB:-vinculohub_db}
      -user=${POSTGRES_USER:-vinculohub}
      -password=${POSTGRES_PASSWORD:-vinculohub}
      migrate
    deploy:
      placement:
        constraints: [node.role == manager]

volumes:
  db_data_dev:
  db_data_prod:
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - ${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-vinculohub_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-vinculohub}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173,http://localhost}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=vinculohub-portal-storage
      - AWS_REGION=us-east-2
      - AUTH0_ISSUER_URI=${AUTH0_ISSUER_URI}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - AUTH0_ROLES_CLAIM=${AUTH0_ROLES_CLAIM:-https://vinculohub/roles}
      - APP_SAMPLE_DATA_ENABLED=${APP_SAMPLE_DATA_ENABLED:-false}
      - APP_SAMPLE_DATA_DATASET_ID=${APP_SAMPLE_DATA_DATASET_ID:-default}
      - APP_SAMPLE_DATA_LOCATION=${APP_SAMPLE_DATA_LOCATION:-file:/sample-data}
      - APP_SAMPLE_DATA_AUTH0_DOMAIN=${APP_SAMPLE_DATA_AUTH0_DOMAIN:-}
      - APP_SAMPLE_DATA_AUTH0_CLIENT_ID=${APP_SAMPLE_DATA_AUTH0_CLIENT_ID:-}
      - APP_SAMPLE_DATA_AUTH0_CLIENT_SECRET=${APP_SAMPLE_DATA_AUTH0_CLIENT_SECRET:-}
    volumes:
      - ${APP_SAMPLE_DATA_HOST_PATH:-./backend/src/main/resources/db/sample-data/default}:/sample-data:ro
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE:-https://api.vinculohub}
    ports:
      - 80:80
  flyway:
    image: flyway/flyway:9
    container_name: flyway
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql:ro
    command: >
      -url=jdbc:postgresql://db:5432/${POSTGRES_DB:-vinculohub_db}
      -user=${POSTGRES_USER:-vinculohub}
      -password=${POSTGRES_PASSWORD:-vinculohub}
      migrate
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vinculohub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - POSTGRES_DB=${POSTGRES_DB:-vinculohub_db}
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-vinculohub} -d ${POSTGRES_DB:-vinculohub_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  db_data:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - ${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-vinculohub_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-vinculohub}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - AUTH0_ISSUER_URI=${AUTH0_ISSUER_URI}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - AUTH0_ROLES_CLAIM=${AUTH0_ROLES_CLAIM:-https://vinculohub/roles}
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 80:80
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vinculohub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vinculohub}
      - POSTGRES_DB=${POSTGRES_DB:-vinculohub_db}
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinculohub} -d ${POSTGRES_DB:-vinculohub_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  db_data:

